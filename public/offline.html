<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WORDLOCK — Offline</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f6f2;
        --fg: #0d0d0f;
        --muted: #6b6b6b;
        --accent: #ff4a1c;
        --line: rgba(13, 13, 15, 0.16);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d0d0f;
          --fg: #f7f6f2;
          --muted: #9a9a9a;
          --line: rgba(247, 246, 242, 0.18);
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        display: grid;
        place-items: center;
        padding: 2rem;
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 30rem;
        text-align: left;
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.75rem;
        color: var(--muted);
        margin: 0 0 0.75rem;
      }
      h1 {
        font-size: clamp(2rem, 8vw, 3rem);
        line-height: 1.02;
        letter-spacing: -0.02em;
        margin: 0 0 1rem;
      }
      p {
        font-size: 1.0625rem;
        line-height: 1.5;
        color: var(--muted);
        margin: 0 0 1.75rem;
      }
      .bars {
        display: grid;
        gap: 0.5rem;
        margin: 0 0 2rem;
      }
      .bar {
        height: 0.75rem;
        background: var(--fg);
      }
      .bar:nth-child(2) {
        background: var(--accent);
        width: 100%;
      }
      .bar:nth-child(3) {
        width: 62%;
      }
      a.button {
        display: inline-block;
        text-decoration: none;
        color: var(--bg);
        background: var(--accent);
        padding: 0.8rem 1.4rem;
        font-weight: 600;
        border: 1px solid var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="bars" aria-hidden="true">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
      <p class="eyebrow">WORDLOCK</p>
      <h1>You’re offline</h1>
      <p>
        This page isn’t cached yet. Once WORDLOCK has loaded online, the whole game — decks, rules
        and play — works without a connection.
      </p>
      <a class="button" href=".">Try again</a>
    </main>
  </body>
</html>
