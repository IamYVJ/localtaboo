<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <meta name="theme-color" content="#0d0d0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f6f2" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="WORDLOCK — a fast, minimalist forbidden-word party game for one screen or many. Local-first and privacy-focused."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>WORDLOCK — Say everything except the obvious.</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem("wordlock:theme");
          var theme = stored ? JSON.parse(stored) : "system";
          var prefersDark =
            window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = theme === "system" ? (prefersDark ? "dark" : "light") : theme;
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>WORDLOCK requires JavaScript to run. Please enable JavaScript in your browser.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
